---
- name: Load OS specific vars
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_facts['distribution'] | lower }}.yml"
    - "{{ ansible_facts['os_family'] | lower }}.yml"
    - "arch.yml"  # fallback for cachyos, endeavouros etc

- name: Update package cache and install (Arch)
  community.general.pacman:
    name: "{{ packages }}"
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == "Archlinux"

- name: Install AUR packages
  kewlfft.aur.aur:
    name: "{{ aur_packages }}"
    state: present
  become: false
  when: ansible_facts['os_family'] == "Archlinux"

- name: Install packages (Debian)
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == "Debian"

- name: Install packages (Fedora)
  ansible.builtin.dnf:
    name: "{{ packages }}"
    state: present
  when: ansible_facts['os_family'] == "RedHat"

- name: Install packages (macOS)
  community.general.homebrew:
    name: "{{ packages }}"
    state: present
  when: ansible_facts['os_family'] == "Darwin"

# tectonic fallback for distros where it's not in repos
- name: Install tectonic via cargo (Debian fallback)
  ansible.builtin.command:
    cmd: cargo install tectonic
    creates: "~/.cargo/bin/tectonic"
  when: ansible_facts['os_family'] == "Debian"
  become: false
