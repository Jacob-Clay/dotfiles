---
- name: Install npm global packages
  community.general.npm:
    name: "{{ item }}"
    global: true
  loop:
    - prettier
    - markdown-toc
    - markdownlint-cli2
    - "@mermaid-js/mermaid-cli"

- name: Install python neovim module (Debian/Fedora)
  ansible.builtin.pip:
    name: neovim
    extra_args: --user
  become: false
  when: ansible_facts['os_family'] != "Archlinux" and ansible_facts['os_family] != "Darwin"

- name: Install treesitter parsers
  ansible.builtin.command:
    cmd: nvim --headless +"TSInstall! css latex scss svelte typst vue" +qa
    creates: "~/.local/share/nvim/site/parser/vue.so"
  become: false
  changed_when: false
